<svg viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg" font-family="monospace" font-size="12">
  <rect width="900" height="620" fill="#f8f9fa"/>
  <text x="450" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1a2e">Data Access Layer — UML Class Diagram</text>

  <!-- DataListener (abstract) -->
  <rect x="310" y="55" width="240" height="130" fill="white" stroke="#1a1a2e" stroke-width="2"/>
  <rect x="310" y="55" width="240" height="25" fill="#1a1a2e"/>
  <text x="430" y="68" text-anchor="middle" fill="white" font-style="italic">«abstract»</text>
  <text x="430" y="76" text-anchor="middle" fill="white" font-weight="bold" dy="2">DataListener</text>
  <line x1="310" y1="105" x2="550" y2="105" stroke="#1a1a2e" stroke-width="1"/>
  <text x="320" y="97" fill="#333">- adapter: DataSourceAdapter</text>
  <text x="320" y="113" fill="#333">- isRunning: boolean</text>
  <line x1="310" y1="122" x2="550" y2="122" stroke="#1a1a2e" stroke-width="1"/>
  <text x="320" y="137" fill="#333">+ startListening(): void  «abstract»</text>
  <text x="320" y="153" fill="#333">+ stopListening(): void  «abstract»</text>
  <text x="320" y="169" fill="#333">+ isRunning(): boolean</text>

  <!-- TCPDataListener -->
  <rect x="20" y="280" width="220" height="130" fill="white" stroke="#1a1a2e" stroke-width="2"/>
  <rect x="20" y="280" width="220" height="25" fill="#1a1a2e"/>
  <text x="130" y="297" text-anchor="middle" fill="white" font-weight="bold">TCPDataListener</text>
  <line x1="20" y1="322" x2="240" y2="322" stroke="#1a1a2e" stroke-width="1"/>
  <text x="30" y="315" fill="#333">- port: int</text>
  <text x="30" y="315" fill="#333" dy="14">- serverSocket: ServerSocket</text>
  <line x1="20" y1="338" x2="240" y2="338" stroke="#1a1a2e" stroke-width="1"/>
  <text x="30" y="353" fill="#333">+ startListening(): void</text>
  <text x="30" y="369" fill="#333">+ stopListening(): void</text>
  <text x="30" y="385" fill="#333">+ getPort(): int</text>
  <text x="30" y="401" fill="#333">+ acceptConnections(): void</text>

  <!-- WebSocketDataListener -->
  <rect x="310" y="280" width="240" height="130" fill="white" stroke="#1a1a2e" stroke-width="2"/>
  <rect x="310" y="280" width="240" height="25" fill="#1a1a2e"/>
  <text x="430" y="297" text-anchor="middle" fill="white" font-weight="bold">WebSocketDataListener</text>
  <line x1="310" y1="322" x2="550" y2="322" stroke="#1a1a2e" stroke-width="1"/>
  <text x="320" y="315" fill="#333">- port: int</text>
  <text x="320" y="315" fill="#333" dy="14">- webSocketServer: WebSocketServer</text>
  <line x1="310" y1="338" x2="550" y2="338" stroke="#1a1a2e" stroke-width="1"/>
  <text x="320" y="353" fill="#333">+ startListening(): void</text>
  <text x="320" y="369" fill="#333">+ stopListening(): void</text>
  <text x="320" y="385" fill="#333">+ onMessage(msg: String): void</text>
  <text x="320" y="401" fill="#333">+ getPort(): int</text>

  <!-- FileDataListener -->
  <rect x="620" y="280" width="240" height="130" fill="white" stroke="#1a1a2e" stroke-width="2"/>
  <rect x="620" y="280" width="240" height="25" fill="#1a1a2e"/>
  <text x="740" y="297" text-anchor="middle" fill="white" font-weight="bold">FileDataListener</text>
  <line x1="620" y1="322" x2="860" y2="322" stroke="#1a1a2e" stroke-width="1"/>
  <text x="630" y="315" fill="#333">- filePath: String</text>
  <text x="630" y="315" fill="#333" dy="14">- pollInterval: long</text>
  <line x1="620" y1="338" x2="860" y2="338" stroke="#1a1a2e" stroke-width="1"/>
  <text x="630" y="353" fill="#333">+ startListening(): void</text>
  <text x="630" y="369" fill="#333">+ stopListening(): void</text>
  <text x="630" y="385" fill="#333">+ readFile(): List&lt;String&gt;</text>
  <text x="630" y="401" fill="#333">+ setPollInterval(ms: long): void</text>

  <!-- DataParser -->
  <rect x="20" y="490" width="240" height="115" fill="white" stroke="#1a1a2e" stroke-width="2"/>
  <rect x="20" y="490" width="240" height="25" fill="#1a1a2e"/>
  <text x="140" y="507" text-anchor="middle" fill="white" font-weight="bold">DataParser</text>
  <line x1="20" y1="532" x2="260" y2="532" stroke="#1a1a2e" stroke-width="1"/>
  <text x="30" y="525" fill="#333">- format: String</text>
  <line x1="20" y1="540" x2="260" y2="540" stroke="#1a1a2e" stroke-width="1"/>
  <text x="30" y="555" fill="#333">+ parse(rawData: String): PatientRecord</text>
  <text x="30" y="571" fill="#333">+ detectFormat(data: String): String</text>
  <text x="30" y="587" fill="#333">+ validateFormat(data: String): boolean</text>
  <text x="30" y="600" fill="#333" dy="2">+ setFormat(format: String): void</text>

  <!-- DataSourceAdapter -->
  <rect x="340" y="490" width="260" height="115" fill="white" stroke="#1a1a2e" stroke-width="2"/>
  <rect x="340" y="490" width="260" height="25" fill="#1a1a2e"/>
  <text x="470" y="507" text-anchor="middle" fill="white" font-weight="bold">DataSourceAdapter</text>
  <line x1="340" y1="532" x2="600" y2="532" stroke="#1a1a2e" stroke-width="1"/>
  <text x="350" y="525" fill="#333">- storage: DataStorage</text>
  <text x="350" y="525" fill="#333" dy="14">- parser: DataParser</text>
  <line x1="340" y1="548" x2="600" y2="548" stroke="#1a1a2e" stroke-width="1"/>
  <text x="350" y="563" fill="#333">+ onDataReceived(rawData: String): void</text>
  <text x="350" y="579" fill="#333">+ forwardToStorage(record: PatientRecord): void</text>
  <text x="350" y="595" fill="#333">+ handleError(e: Exception): void</text>
  <text x="350" y="608" fill="#333" dy="2">+ setParser(parser: DataParser): void</text>

  <!-- DataStorage (external) -->
  <rect x="670" y="490" width="190" height="60" fill="#e8e8e8" stroke="#999" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="765" y="515" text-anchor="middle" fill="#555" font-weight="bold">«external»</text>
  <text x="765" y="535" text-anchor="middle" fill="#555" font-weight="bold">DataStorage</text>

  <!-- Inheritance arrows (triangle) -->
  <line x1="130" y1="280" x2="380" y2="185" stroke="#333" stroke-width="1.5" marker-end="url(#inherit)"/>
  <line x1="430" y1="280" x2="430" y2="185" stroke="#333" stroke-width="1.5" marker-end="url(#inherit)"/>
  <line x1="740" y1="280" x2="480" y2="185" stroke="#333" stroke-width="1.5" marker-end="url(#inherit)"/>

  <!-- Labels on inheritance -->
  <text x="220" y="228" font-size="10" fill="#555">extends</text>
  <text x="435" y="238" font-size="10" fill="#555">extends</text>
  <text x="590" y="228" font-size="10" fill="#555">extends</text>

  <!-- DataListener uses DataSourceAdapter -->
  <line x1="430" y1="185" x2="470" y2="490" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="5,3"/>
  <text x="455" y="340" font-size="10" fill="#555">uses</text>

  <!-- DataSourceAdapter uses DataParser -->
  <line x1="340" y1="548" x2="260" y2="548" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="268" y="541" font-size="10" fill="#555">uses</text>

  <!-- DataSourceAdapter uses DataStorage -->
  <line x1="600" y1="548" x2="670" y2="525" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="610" y="530" font-size="10" fill="#555">stores to</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
    <marker id="inherit" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto">
      <polygon points="0 0, 10 5, 0 10" fill="none" stroke="#333" stroke-width="1.5"/>
    </marker>
  </defs>
</svg>
