<svg viewBox="0 0 900 580" xmlns="http://www.w3.org/2000/svg" font-family="monospace" font-size="12">
  <rect width="900" height="580" fill="#f8f9fa"/>
  <text x="450" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1a2e">Patient Identification System — UML Class Diagram</text>

  <!-- PatientIdentifier -->
  <rect x="300" y="55" width="260" height="145" fill="white" stroke="#1a1a2e" stroke-width="2"/>
  <rect x="300" y="55" width="260" height="25" fill="#1a1a2e"/>
  <text x="430" y="72" text-anchor="middle" fill="white" font-weight="bold">PatientIdentifier</text>
  <line x1="300" y1="105" x2="560" y2="105" stroke="#1a1a2e" stroke-width="1"/>
  <text x="310" y="97" fill="#333">- identityManager: IdentityManager</text>
  <text x="310" y="113" fill="#333">- mismatchLog: MismatchLog</text>
  <line x1="300" y1="122" x2="560" y2="122" stroke="#1a1a2e" stroke-width="1"/>
  <text x="310" y="137" fill="#333">+ matchPatient(simulatorId: int): HospitalPatient</text>
  <text x="310" y="153" fill="#333">+ validateId(simulatorId: int): boolean</text>
  <text x="310" y="169" fill="#333">+ handleMismatch(simulatorId: int): void</text>
  <text x="310" y="185" fill="#333">+ linkDataToPatient(id: int, data: PatientRecord): void</text>

  <!-- HospitalPatient -->
  <rect x="20" y="55" width="230" height="160" fill="white" stroke="#1a1a2e" stroke-width="2"/>
  <rect x="20" y="55" width="230" height="25" fill="#1a1a2e"/>
  <text x="135" y="72" text-anchor="middle" fill="white" font-weight="bold">HospitalPatient</text>
  <line x1="20" y1="105" x2="250" y2="105" stroke="#1a1a2e" stroke-width="1"/>
  <text x="30" y="97" fill="#333">- patientId: int</text>
  <text x="30" y="113" fill="#333">- name: String</text>
  <line x1="20" y1="122" x2="250" y2="122" stroke="#1a1a2e" stroke-width="1"/>
  <text x="30" y="137" fill="#333">- dateOfBirth: String</text>
  <text x="30" y="153" fill="#333">- medicalHistory: List&lt;String&gt;</text>
  <text x="30" y="169" fill="#333">- assignedWard: String</text>
  <line x1="20" y1="178" x2="250" y2="178" stroke="#1a1a2e" stroke-width="1"/>
  <text x="30" y="193" fill="#333">+ getPatientId(): int</text>
  <text x="30" y="209" fill="#333">+ getMedicalHistory(): List&lt;String&gt;</text>

  <!-- IdentityManager -->
  <rect x="640" y="55" width="240" height="160" fill="white" stroke="#1a1a2e" stroke-width="2"/>
  <rect x="640" y="55" width="240" height="25" fill="#1a1a2e"/>
  <text x="760" y="72" text-anchor="middle" fill="white" font-weight="bold">IdentityManager</text>
  <line x1="640" y1="105" x2="880" y2="105" stroke="#1a1a2e" stroke-width="1"/>
  <text x="650" y="97" fill="#333">- patients: List&lt;HospitalPatient&gt;</text>
  <text x="650" y="113" fill="#333">- idMappings: Map&lt;Integer, Integer&gt;</text>
  <line x1="640" y1="122" x2="880" y2="122" stroke="#1a1a2e" stroke-width="1"/>
  <text x="650" y="137" fill="#333">+ registerPatient(p: HospitalPatient): void</text>
  <text x="650" y="153" fill="#333">+ findById(simulatorId: int): HospitalPatient</text>
  <text x="650" y="169" fill="#333">+ handleMismatch(simulatorId: int): void</text>
  <text x="650" y="185" fill="#333">+ removePatient(patientId: int): void</text>
  <text x="650" y="201" fill="#333">+ getAllPatients(): List&lt;HospitalPatient&gt;</text>

  <!-- MismatchLog -->
  <rect x="300" y="290" width="260" height="145" fill="white" stroke="#1a1a2e" stroke-width="2"/>
  <rect x="300" y="290" width="260" height="25" fill="#1a1a2e"/>
  <text x="430" y="307" text-anchor="middle" fill="white" font-weight="bold">MismatchLog</text>
  <line x1="300" y1="332" x2="560" y2="332" stroke="#1a1a2e" stroke-width="1"/>
  <text x="310" y="325" fill="#333">- entries: List&lt;MismatchEntry&gt;</text>
  <line x1="300" y1="340" x2="560" y2="340" stroke="#1a1a2e" stroke-width="1"/>
  <text x="310" y="355" fill="#333">+ logMismatch(simulatorId: int, reason: String): void</text>
  <text x="310" y="371" fill="#333">+ getEntries(): List&lt;MismatchEntry&gt;</text>
  <text x="310" y="387" fill="#333">+ clearLog(): void</text>
  <text x="310" y="403" fill="#333">+ getMismatchCount(): int</text>
  <text x="310" y="419" fill="#333">+ exportLog(): String</text>

  <!-- MismatchEntry -->
  <rect x="20" y="290" width="230" height="130" fill="white" stroke="#1a1a2e" stroke-width="2"/>
  <rect x="20" y="290" width="230" height="25" fill="#1a1a2e"/>
  <text x="135" y="307" text-anchor="middle" fill="white" font-weight="bold">MismatchEntry</text>
  <line x1="20" y1="332" x2="250" y2="332" stroke="#1a1a2e" stroke-width="1"/>
  <text x="30" y="325" fill="#333">- simulatorId: int</text>
  <text x="30" y="325" fill="#333" dy="14">- timestamp: long</text>
  <text x="30" y="354" fill="#333">- reason: String</text>
  <line x1="20" y1="363" x2="250" y2="363" stroke="#1a1a2e" stroke-width="1"/>
  <text x="30" y="378" fill="#333">+ getDetails(): String</text>
  <text x="30" y="394" fill="#333">+ getTimestamp(): long</text>
  <text x="30" y="410" fill="#333">+ getReason(): String</text>

  <!-- HospitalDatabase (external) -->
  <rect x="640" y="290" width="240" height="70" fill="#e8e8e8" stroke="#999" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="760" y="320" text-anchor="middle" fill="#555" font-weight="bold">«external»</text>
  <text x="760" y="340" text-anchor="middle" fill="#555" font-weight="bold">HospitalDatabase</text>

  <!-- Arrows -->
  <!-- PatientIdentifier uses IdentityManager -->
  <line x1="560" y1="105" x2="640" y2="105" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="572" y="98" font-size="10" fill="#555">uses</text>

  <!-- PatientIdentifier returns HospitalPatient -->
  <line x1="300" y1="120" x2="250" y2="120" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="5,3"/>
  <text x="252" y="113" font-size="10" fill="#555">returns</text>

  <!-- PatientIdentifier logs to MismatchLog -->
  <line x1="430" y1="200" x2="430" y2="290" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="435" y="248" font-size="10" fill="#555">logs to</text>

  <!-- IdentityManager manages HospitalPatient -->
  <line x1="640" y1="140" x2="250" y2="140" stroke="#333" stroke-width="1.5" marker-end="url(#diamond)"/>
  <text x="380" y="133" font-size="10" fill="#555">manages 0..*</text>

  <!-- MismatchLog composes MismatchEntry -->
  <line x1="300" y1="360" x2="250" y2="360" stroke="#333" stroke-width="1.5" marker-end="url(#diamond)"/>
  <text x="252" y="353" font-size="10" fill="#555">1..*</text>

  <!-- IdentityManager queries HospitalDatabase -->
  <line x1="760" y1="215" x2="760" y2="290" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="5,3"/>
  <text x="765" y="258" font-size="10" fill="#555">queries</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
    <marker id="diamond" markerWidth="12" markerHeight="8" refX="0" refY="4" orient="auto">
      <polygon points="0 4, 4 0, 8 4, 4 8" fill="#333"/>
    </marker>
  </defs>

  <!-- Legend -->
  <rect x="20" y="490" width="420" height="75" fill="white" stroke="#ccc" stroke-width="1"/>
  <text x="30" y="508" font-size="11" font-weight="bold" fill="#333">Legend</text>
  <line x1="30" y1="520" x2="80" y2="520" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="85" y="524" font-size="10" fill="#333">Association / uses</text>
  <line x1="30" y1="538" x2="80" y2="538" stroke="#333" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <text x="85" y="542" font-size="10" fill="#333">Dependency (returns / queries)</text>
  <line x1="30" y1="556" x2="80" y2="556" stroke="#333" stroke-width="1.5" marker-end="url(#diamond)"/>
  <text x="85" y="560" font-size="10" fill="#333">Composition / Aggregation</text>
</svg>
